name: PlanIt
options:
  bundleIdPrefix: com.planit
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    INFOPLIST_FILE: PlanIt/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: PlanIt/Resources/PlanIt.entitlements

targets:
  PlanIt:
    type: application
    platform: [iOS, macOS]
    sources:
      - PlanIt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.planit.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SUPPORTS_MACCATALYST: "YES"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
    entitlements:
      path: PlanIt/Resources/PlanIt.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access:
          - HKQuantityTypeIdentifierHeartRateVariabilitySDNN
          - HKCategoryTypeIdentifierSleepAnalysis
        com.apple.developer.siri: true
